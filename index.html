<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRI RAMA KIRANA SHOP</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h1>🏪 SRI RAMA KIRANA SHOP</h1>
    <p>Your Daily Grocery & Stationery Store</p>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Search Products...">
</div>

<div id="products" class="product-container">

<div class="product-card">
<img src="https://via.placeholder.com/180" alt="">
<h3>Good Day</h3>
<p>Brand : Britannia</p>
<h2>₹10</h2>
<span class="available">Available</span>
</div>

<div class="product-card">
<img src="https://via.placeholder.com/180" alt="">
<h3>Krackjack</h3>
<p>Brand : Parle</p>
<h2>₹10</h2>
<span class="available">Available</span>
</div>

<div class="product-card">
<img src="https://via.placeholder.com/180" alt="">
<h3>Hide & Seek</h3>
<p>Brand : Parle</p>
<h2>₹30</h2>
<span class="available">Available</span>
</div>

</div>

<footer>

<h3>📍 SRI RAMA KIRANA SHOP</h3>

<p>Groceries • Stationery • Daily Essentials</p>

</footer>

<script src="script.js"></script>

</body>
</html>
